name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal config or code snippet to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: '0.1.0'
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
    validations:
      required: false
